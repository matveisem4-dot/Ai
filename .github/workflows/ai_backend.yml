name: AI Backend Generator
on:
  repository_dispatch:
    types: [ai_real_run]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - name: Generate
        run: |
          RESPONSE=$(curl -s -X POST https://text.pollinations.ai/ \
            -H "Content-Type: application/json" \
            -d '{"messages": [{"role": "user", "content": "${{ github.event.client_payload.user_prompt }}"}], "model": "openai"}')
          
          # Генерируем основной результат
          echo "$RESPONSE" > index.html
          
      - name: Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add index.html
          git commit -m "AI Update" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
