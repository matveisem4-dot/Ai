name: AI Core Engine
on: [repository_dispatch]
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Process
        shell: python
        run: |
          import os, requests, json
          prompt = "${{ github.event.client_payload.prompt }}"
          weight = float("${{ github.event.client_payload.weight }}")
          type = "${{ github.event.client_payload.type }}"
          
          if type == "code":
              res = requests.post("https://text.pollinations.ai/", json={
                  "messages": [{"role": "user", "content": prompt}],
                  "model": "openai",
                  "seed": 42,
                  "temperature": weight
              })
              with open("index.html", "w") as f: f.write(res.text)
              
          elif type == "image":
              img_url = f"https://image.pollinations.ai/prompt/{prompt}?width=1024&height=1024&seed=42"
              with open("index.html", "w") as f: f.write(f"<img src='{img_url}'>")
          
          elif type == "audio":
              # Используем TTS/Audio API напрямую
              audio_url = f"https://text.pollinations.ai/tts/{prompt}"
              with open("index.html", "w") as f: f.write(f"<audio controls src='{audio_url}'></audio>")

      - name: Push Result
        run: |
          git config --global user.name "AI"
          git add index.html
          git commit -m "update" || exit 0
          git push
        env: { GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }} }
