name: Real AI Backend Engine
on:
  repository_dispatch:
    types: [ai_real_run]

# Даем воркфлоу права на запись в репозиторий и на обновление GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate_code_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Call AI Engine
        run: |
          echo "Запуск ИИ генерации под промпт: ${{ github.event.client_payload.user_prompt }}"
          
          RESPONSE=$(curl -s -X POST https://text.pollinations.ai/ \
            -H "Content-Type: application/json" \
            -d '{
              "messages": [
                {"role": "system", "content": "Ты — профессиональный веб-разработчик. Напиши полноценный, полностью рабочий HTML код с CSS и JS под запрос пользователя. Выводи ТОЛЬКО чистый код, без markdown тегов."},
                {"role": "user", "content": "${{ github.event.client_payload.user_prompt }}"}
              ],
              "model": "openai"
            }')
          
          echo "$RESPONSE" > result.html
          echo "Файл result.html готов."

      - name: Commit and Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add result.html
          git commit -m "ИИ сгенерировал код для: ${{ github.event.client_payload.user_prompt }}" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Вот этот шаг принудительно обновляет твой GitHub Pages прямо во время работы Actions!
      - name: Trigger GitHub Pages Deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages # Гитхаб возьмет обновленный корень репа и выкатит на сайт
