<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Actions AI Controller</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #06090f; color: #00ff66; font-family: monospace; padding: 15px; display: flex; flex-direction: column; height: 100vh; }
        header { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #00ff66; padding-bottom: 10px; }
        .main-layout { display: flex; flex-direction: column; flex: 1; gap: 12px; max-width: 800px; width: 100%; margin: 0 auto; }
        .config-panel { background: #0a0f1d; padding: 10px; border: 1px solid #00ff66; display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #00ff66; color: #00ff66; padding: 10px; font-family: inherit; outline: none; }
        .btn { background: #00ff66; color: #000; border: none; padding: 0 20px; font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn:disabled { background: #004411; color: #00aa44; }
        .monitor { font-size: 12px; color: #00aa44; padding: 6px; border: 1px dashed #004411; }
        .terminal { flex: 1; border: 1px solid #00ff66; background: #000; padding: 15px; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>

<header>
    <h1>GITHUB AI CORE v12.0</h1>
    <p>Реальный бэкенд на серверах GitHub Actions</p>
</header>

<div class="main-layout">
    <div class="config-panel">
        <div class="row">
            <input type="text" id="ghRepo" placeholder="логин/репозиторий (например: ivan/ai-core)">
            <input type="password" id="ghToken" placeholder="Вставь сюда свой токен ghp_...">
        </div>
        <div class="row">
            <input type="text" id="aiPrompt" placeholder="Что сгенерировать? (например: игра змейка на html)...">
            <button class="btn" id="runBtn" onclick="fireAction()">Запустить</button>
        </div>
    </div>

    <div class="monitor" id="monitorText">[СТАТУС]: Ожидание ввода данных...</div>
    <div class="terminal" id="outputLog">>>> Сюда придет ответ от API GitHub. Статус 204 означает, что сервер РЕАЛЬНО принял твой запрос в обработку.</div>
</div>

<script>
    // Подгружаем сохраненные данные, чтобы не вводить их каждый раз
    document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || '';
    document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';

    async function fireAction() {
        const repo = document.getElementById('ghRepo').value.trim();
        const token = document.getElementById('ghToken').value.trim();
        const prompt = document.getElementById('aiPrompt').value.trim();
        const monitor = document.getElementById('monitorText');
        const output = document.getElementById('outputLog');
        const btn = document.getElementById('runBtn');

        if (!repo || !token || !prompt) return alert("Заполни все поля!");

        // Сохраняем в память телефона
        localStorage.setItem('gh_repo', repo);
        localStorage.setItem('gh_token', token);

        btn.disabled = true;
        monitor.innerText = "[СВЯЗЬ]: Отправка команды на сервер GitHub...";
        output.innerText = "Посылаем REST запрос...\n";

        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/dispatches`, {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    event_type: "ai_real_run",
                    client_payload: { user_prompt: prompt }
                })
            });

            if (response.status === 204) {
                monitor.innerText = "[СЕРВЕР ОТВЕТИЛ: 204 ОК]";
                output.innerText += "УСПЕХ! Робот GitHub принял твой токен и запустил виртуалку Ubuntu.\n";
                output.innerText += `Промпт "${prompt}" ушел на сервера Microsoft.\n\n`;
                output.innerText += "Что делать дальше:\n";
                output.innerText += "1. Подожди около 40-50 секунд.\n";
                output.innerText += "2. В твоем репозитории появится файл 'result.html' — это и есть готовый написанный ИИ код без бланков.";
            } else {
                throw new Error(`GitHub вернул ошибку ${response.status}. Проверь правильность токена и имя репозитория!`);
            }
        } catch (error) {
            monitor.innerText = "[ОШИБКА]";
            output.innerText += `\nКритический сбой: ${error.message}`;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
