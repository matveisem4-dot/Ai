<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Control Center v15.0</title>
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: sans-serif; padding: 20px; }
        .box { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
        select, input, button { padding: 12px; border-radius: 5px; border: 1px solid #30363d; background: #161b22; color: #fff; }
        button { background: #238636; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <h2>AI Control Center</h2>
    <select id="mode">
        <option value="fast">⚡ Быстрый ответ (База)</option>
        <option value="complex">🧠 Сложный (Код + Логика)</option>
        <option value="mega">🚀 Мега-сложный (Chain-of-Thought)</option>
    </select>
    <input type="text" id="prompt" placeholder="Твой запрос...">
    <button onclick="send('text')">Генерировать Код/Текст</button>
    <button onclick="send('image')">🎨 Сгенерировать Картинку</button>
    <button onclick="send('music')">🎵 Сгенерировать Музыку</button>
    <div id="status"></div>
</div>

<script>
    async function send(type) {
        const prompt = document.getElementById('prompt').value;
        const mode = document.getElementById('mode').value;
        document.getElementById('status').innerText = "Отправка команды...";
        
        await fetch(`https://api.github.com/repos/ТВОЙ_ЛОГИН/ai-core/dispatches`, {
            method: 'POST',
            headers: { 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
            body: JSON.stringify({
                event_type: "ai_real_run",
                client_payload: { prompt, mode, type }
            })
        });
        document.getElementById('status').innerText = "Команда ушла в облако!";
    }
</script>
</body>
</html>
