<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Control Center</title>
    <style>
        body { background: #06090f; color: #00ff66; font-family: monospace; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        input, button { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #00ff66; color: #00ff66; }
        button { background: #00ff66; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>AI CONTROL PANEL</h2>
    <input type="text" id="aiPrompt" placeholder="Что сгенерировать?">
    <button onclick="fireAction()">ЗАПУСК ГЕНЕРАЦИИ</button>
    <div id="status"></div>
</div>

<script>
    async function fireAction() {
        const prompt = document.getElementById('aiPrompt').value;
        const status = document.getElementById('status');
        
        // Автоматически берет данные из адреса репозитория
        // Если твоя ссылка: matveisem4.github.io/ai-core/
        // То он сам определит логин и репозиторий
        const pathParts = window.location.pathname.split('/');
        const repo = "matveisem4/ai-core"; // Вставь сюда свой логин/реп вручную один раз
        
        status.innerText = "Отправка команды...";

        await fetch(`https://api.github.com/repos/${repo}/dispatches`, {
            method: 'POST',
            headers: {
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
                // Токен теперь НЕ нужен здесь, мы все перенесли в Actions!
            },
            body: JSON.stringify({
                event_type: "ai_real_run",
                client_payload: { user_prompt: prompt }
            })
        });
        status.innerText = "Сигнал отправлен! Жди 40 секунд.";
    }
</script>
</body>
</html>
        </div>
    </div>

    <div class="monitor" id="monitorText">[СТАТУС]: Ожидание ввода данных...</div>
    <div class="terminal" id="outputLog">>>> Сюда придет ответ от API GitHub. Статус 204 означает, что сервер РЕАЛЬНО принял твой запрос в обработку.</div>
</div>

<script>
    // Подгружаем сохраненные данные, чтобы не вводить их каждый раз
    document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || '';
    document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';

    async function fireAction() {
        const repo = document.getElementById('ghRepo').value.trim();
        const token = document.getElementById('ghToken').value.trim();
        const prompt = document.getElementById('aiPrompt').value.trim();
        const monitor = document.getElementById('monitorText');
        const output = document.getElementById('outputLog');
        const btn = document.getElementById('runBtn');

        if (!repo || !token || !prompt) return alert("Заполни все поля!");

        // Сохраняем в память телефона
        localStorage.setItem('gh_repo', repo);
        localStorage.setItem('gh_token', token);

        btn.disabled = true;
        monitor.innerText = "[СВЯЗЬ]: Отправка команды на сервер GitHub...";
        output.innerText = "Посылаем REST запрос...\n";

        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/dispatches`, {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    event_type: "ai_real_run",
                    client_payload: { user_prompt: prompt }
                })
            });

            if (response.status === 204) {
                monitor.innerText = "[СЕРВЕР ОТВЕТИЛ: 204 ОК]";
                output.innerText += "УСПЕХ! Робот GitHub принял твой токен и запустил виртуалку Ubuntu.\n";
                output.innerText += `Промпт "${prompt}" ушел на сервера Microsoft.\n\n`;
                output.innerText += "Что делать дальше:\n";
                output.innerText += "1. Подожди около 40-50 секунд.\n";
                output.innerText += "2. В твоем репозитории появится файл 'result.html' — это и есть готовый написанный ИИ код без бланков.";
            } else {
                throw new Error(`GitHub вернул ошибку ${response.status}. Проверь правильность токена и имя репозитория!`);
            }
        } catch (error) {
            monitor.innerText = "[ОШИБКА]";
            output.innerText += `\nКритический сбой: ${error.message}`;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
